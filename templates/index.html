<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f3; padding-top: 40px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .btn-success { background-color: #28a745; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3 class="text-center text-primary mb-4">Used Car Price Predictor</h3>
                    <form action="/predict" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Present Showroom Price (In Lakhs)</label>
                                <input type="number" step="0.01" name="Present_Price" class="form-control" placeholder="e.g. 5.5" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Kilometers Driven</label>
                                <input type="number" name="Kms_Driven" class="form-control" placeholder="e.g. 45000" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fuel Type</label>
                                <select name="Fuel_Type" class="form-select">
                                    <option value="0">Petrol</option>
                                    <option value="1">Diesel</option>
                                    <option value="2">CNG</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Seller Type</label>
                                <select name="Seller_Type" class="form-select">
                                    <option value="0">Dealer</option>
                                    <option value="1">Individual</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Transmission</label>
                                <select name="Transmission" class="form-select">
                                    <option value="0">Manual</option>
                                    <option value="1">Automatic</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Past Owners (0, 1, 3)</label>
                                <input type="number" name="Owner" class="form-control" value="0" required>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Age of Car (Years)</label>
                                <input type="number" name="Car_Age" class="form-control" placeholder="e.g. 5" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2">Estimate Selling Price</button>
                    </form>

                    {% if prediction_text %}
                    <div class="mt-4 alert alert-success text-center">
                        <h4>{{ prediction_text }}</h4>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
